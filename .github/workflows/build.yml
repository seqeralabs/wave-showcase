name: Wave CI
on:
  push:
    branches:
      - 'master'
  schedule:
    - cron:  '0 15 * * *'

jobs:
  build:
    name: Wave showcase example
    if: "github.event == 'push' || github.repository != github.event.pull_request.head.repo.full_name"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Environment
        run: env | sort

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Setup env
        run: |
          rm -f $HOME/.gitconfig; 
          
      - name: Setup Java ${{ matrix.java_version }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 11
          distribution: 'adopt'
          architecture: x64

      - name: Install
        run: |
          curl -fsSL get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin 

      - name: Tests
        run: |          
          (cd example1; bash run.sh)
          (cd example2; bash run.sh)
          (cd example6; bash run.sh)
        env:
          TOWER_ACCESS_TOKEN: ${{ secrets.TOWER_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{secrets.TOWER_CI_AWS_ACCESS}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.TOWER_CI_AWS_SECRET}}

      - name: Publish tests results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            **/.nextflow*
